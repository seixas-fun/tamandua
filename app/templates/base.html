<!DOCTYPE html>
<html lang="{{ session.get('lang', 'en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamanduá - {{ _('Can you guess all the flags?') }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logos/favicon.svg') }}">
    
    <style>
        :root {
            --primary: #61b4e1;
            --dark: #1b2c5e;
            --accent-gold: #f1c40f;
            --background: #f8f9fa;
            --white: #ffffff;
            --red: #e74c3c;
        }

        /* Global Tier Badges */
        .tier-badge { padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin: 0 5px;}
        .tier-Diamond { background: #e0f7fa; color: #00bcd4; border: 2px solid #00bcd4; }
        .tier-Gold { background: #fff8e1; color: #ffc107; border: 2px solid #ffc107; }
        .tier-Silver { background: #f5f5f5; color: #9e9e9e; border: 2px solid #9e9e9e; }
        .tier-Bronze { background: #efebe9; color: #b15b3c; border: 2px solid #b15b3c; }
        .tier-Unranked { background: #eee; color: #666; border: 2px solid #ccc; }
        
        * {
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px 0;
            min-height: 100vh;
            background: radial-gradient(circle at top right, var(--primary), var(--dark));
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            z-index: 0;
            pointer-events: none;
        }

        body::before { width: 400px; height: 400px; top: -100px; left: -100px; }
        body::after { width: 300px; height: 300px; bottom: -50px; right: -50px; }

        /* Universal Card Style for all pages */
        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top Navigation Bar */
        .top-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: var(--white);
            padding: 8px 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            scale: 1.1;
        }

        .user-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="{{ url_for('game.index') }}" class="nav-btn" style="font-weight: bold; scale: 1.2;">
            <i class="fas fa-home"></i>
        </a>

        <a href="{{ url_for('ranking.index') }}" class="nav-btn" style="scale: 1.2;">
            <i class="fas fa-trophy"></i> 
        </a>

        <a href="{{ url_for('game.set_language', lang='pt' if session.get('lang') != 'pt' else 'en') }}" class="nav-btn" style="scale: 1.1;">
            {{ '🇧🇷 BR' if session.get('lang') != 'pt' else '🇬🇧 EN' }}
        </a>


        {% if current_user.is_authenticated %}
            <a href="{{ url_for('profile.dashboard') }}" class="nav-btn">
                <img src="{{ current_user.avatar }}" alt="Avatar" class="user-avatar">
                {{ current_user.nickname }}
            </a>
            <a href="{{ url_for('auth.logout') }}" class="nav-btn" style="scale: 1.2;" title="{{ _('Logout') }}">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        {% else %}
            <a href="{{ url_for('auth.login') }}" class="nav-btn" style="background: var(--red); color: var(--white); scale: 1.1;">
                <i class="fab fa-google"></i> {{ _('Login') }}
            </a>
        {% endif %}
    </div>

    {% block content %}{% endblock %}

</body>
</html>
