{% extends "base.html" %}

{% block extra_css %}
<style>
    .game-card { max-width: 650px; }
    h1 { font-weight: 800; font-size: 2.5rem; margin: 10px 0; color: var(--dark); letter-spacing: -1px; }
    .progress { font-weight: 800; color: var(--dark); font-size: 1.1rem; }
    .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;}
    .stat-item { padding: 8px 15px; border-radius: 12px; font-weight: 800; font-size: 0.9rem; }
    .stat-hits { background: #2ecc71; color: var(--white); }
    .stat-miss { background: #e74c3c; color: var(--white); }
    .flag-display { background: #eceff1; height: 280px; display: flex; align-items: center; justify-content: center; border-radius: 20px; margin-bottom: 30px; border: 1px solid #eee; }
    .flag-img { max-width: 90%; max-height: 90%; object-fit: contain; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .option-btn { background: white; border: 2px solid #edf2f7; padding: 20px 10px; border-radius: 15px; font-size: 1.1rem; font-weight: 700; color: var(--dark); cursor: pointer; transition: all 0.2s; }
    .option-btn:hover { border-color: var(--primary); background: #f1f8fe; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(56, 46, 204, 0.3); }
    .exit-link { display: inline-block; margin-top: 40px; padding: 10px; color: var(--dark); text-decoration: none; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; }
    .exit-link:hover { color: #e74c3c; }

    /* The Shake Animation */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%, 60% { transform: translateX(-15px); }
        40%, 80% { transform: translateX(15px); }
    }
    .shake-flag {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }

    /* Feedback Colors */
    .btn-correct {
        background-color: #2ecc71 !important; 
        border-color: #27ae60 !important;
        color: white !important;
        border-radius: 15px !important;
        transform: translateY(0) !important;
        box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3) !important;
    }
    
    .btn-wrong {
        background-color: #e74c3c !important; 
        border-color: #c0392b !important;
        color: white !important;
        border-radius: 15px !important;
        transform: translateY(0) !important;
        box-shadow: none !important;
    }
    
    /* Lock the buttons during the delay */
    .btn-locked {
        pointer-events: none !important;
        cursor: default !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="glass-card game-card" {% if session['current_idx'] > 0 %}style="animation: none;"{% endif %}>
    <div class="stats-bar">
        <span class="progress"><i class="fas fa-flag"></i> {{ session['current_idx'] + 1 }} / {{ total_flags }}</span>
        <div style="display: flex; gap: 10px;">
            <span class="stat-item stat-hits"><i class="fas fa-check"></i> {{ session['score'] }}</span>
            <span class="stat-item stat-miss"><i class="fas fa-times"></i> {{ session['errors'] }}</span>
        </div>
    </div>

    <div class="flag-display">
        <img id="flag-image" src="{{ url_for('static', filename='flags/' + folder + '/' + country.image) }}" class="flag-img" alt="Flag">
    </div>

    <div class="options-grid">
        {% for option in options %}
            <button type="button" 
                    class="option-btn" 
                    data-value="{{ option }}"
                    data-correct="{% if option == country.name %}true{% else %}false{% endif %}">
                {{ option }}
            </button>
        {% endfor %}
    </div>

    <a href="{{ url_for('game.index') }}" class="exit-link"><i class="fa-solid fa-right-from-bracket"></i> {{ _('QUIT') }}</a>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const buttons = document.querySelectorAll('.option-btn');
        const flagImage = document.getElementById('flag-image');

        buttons.forEach(button => {
            button.addEventListener('click', function() {
                // Prevent double clicking
                if (this.classList.contains('btn-locked')) return;

                // 1. Lock all buttons
                buttons.forEach(btn => btn.classList.add('btn-locked'));

                // 2. Safely grab the exact string from the button
                const guessValue = this.getAttribute('data-value');
                const isCorrect = this.getAttribute('data-correct') === 'true';

                if (isCorrect) {
                    this.classList.add('btn-correct');
                    submitGuess(guessValue, 300);
                } else {
                    this.classList.add('btn-wrong');
                    const correctBtn = document.querySelector('.option-btn[data-correct="true"]');
                    if (correctBtn) correctBtn.classList.add('btn-correct');

                    if (flagImage) {
                        flagImage.classList.add('shake-flag');
                    }
                    submitGuess(guessValue, 1500);
                }
            });
        });

        // Dynamically build and submit a raw form to guarantee a clean POST request to Python
        function submitGuess(value, delay) {
            setTimeout(() => {
                const f = document.createElement('form');
                f.method = 'POST';
                f.action = '';

                const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
                const c = document.createElement('input');
                c.type = 'hidden';
                c.name = 'csrf_token';
                c.value = csrfToken;

                const i = document.createElement('input');
                i.type = 'hidden';
                i.name = 'choice';
                i.value = value;

                f.appendChild(c);
                f.appendChild(i);
                document.body.appendChild(f);
                f.submit();
            }, delay);
        }
    });
</script>
{% endblock %}
